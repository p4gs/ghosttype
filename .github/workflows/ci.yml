name: CI

on:
  push:
    branches: [main, trufflehog-integration]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Install the real TruffleHog binary so the dual-engine integration
      # tests in tests/test_integration.py actually run (they self-skip if
      # the binary is absent — we want them exercised in CI).
      - name: Install TruffleHog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b /usr/local/bin
          trufflehog --version

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Identical gate to `make check` (kept in sync by hand; see Makefile).
      # Fails the build below the 95% line/branch floor (fail_under in
      # pyproject.toml [tool.coverage.report]).
      - name: Test + coverage gate
        run: pytest --cov=ghosttype --cov-report=term-missing --cov-fail-under=95 -q
